# Grype narrow vulnerability exception file.
# Accepted by repository owner Kartik Hulmukh on 2026-07-18.
# Scope: controlled synthetic preview / controlled-beta release candidate only.
# Expiry: 2026-08-18 or earlier if a fixed stable Python release becomes available.
#
# These three CVEs are in the Python 3.13.14 runtime binary itself.
# No fixed stable Python release exists as of 2026-07-18.
# Alpine migration eliminated all 20 Debian OS package CVEs (23 -> 3).
# Distroless will not solve these because the Python binary is the same.
#
# This file is loaded by Grype via --config .grype.yaml in the Security workflow.
# It is NOT a broad ignore. It targets exactly three CVE IDs on one package
# (python) at one version (3.13.14) with type binary.
#
# A CI guard (scripts/check_grype_exceptions.py) enforces:
#   - no expiry dates in the past
#   - no more than three CVE IDs without explicit review

ignore:
  - vulnerability: CVE-2026-11940
    package:
      name: python
      version: 3.13.14
      type: binary
  - vulnerability: CVE-2026-15308
    package:
      name: python
      version: 3.13.14
      type: binary
  - vulnerability: CVE-2026-11972
    package:
      name: python
      version: 3.13.14
      type: binary
