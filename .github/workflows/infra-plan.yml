name: Infrastructure plan
on:
  pull_request:
    paths:
      - 'infra/aws-controlled-beta/**'
      - '.github/workflows/infra-plan.yml'
permissions:
  contents: read
jobs:
  static:
    name: static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.13'
      - run: python3 scripts/check_iac_contract.py

  tofu-validate:
    name: tofu-validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TOFU_DIGEST: ${{ vars.OPENTOFU_IMAGE_DIGEST }}
      IAC_DIR: infra/aws-controlled-beta
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate OpenTofu image digest format
        run: |
          set -euo pipefail
          [[ "$TOFU_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]] || {
            echo '::error::OPENTOFU_IMAGE_DIGEST is missing or not a valid sha256 digest'
            exit 1
          }
      - name: Run pinned OpenTofu fmt, init, validate
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/opentofu/opentofu@$TOFU_DIGEST"
          docker run --rm -v "$PWD/$IAC_DIR:/workspace" -w /workspace "$IMAGE" fmt -check -recursive
          docker run --rm -v "$PWD/$IAC_DIR:/workspace" -w /workspace "$IMAGE" init -backend=false
          docker run --rm -v "$PWD/$IAC_DIR:/workspace" -w /workspace "$IMAGE" validate
      - name: Record offline validation result
        if: always()
        run: |
          echo 'Offline OpenTofu validation (fmt/init/validate) completed without AWS credentials.' >> "$GITHUB_STEP_SUMMARY"
          echo 'No binary plan was produced. No AWS credentials were requested.' >> "$GITHUB_STEP_SUMMARY"

  speculative-plan:
    name: speculative-plan
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_BOOTSTRAPPED: ${{ vars.AWS_BOOTSTRAPPED }}
      IAC_DIR: infra/aws-controlled-beta
      PLAN_ROLE_ARN: ${{ vars.AWS_PLAN_ROLE_ARN }}
      TOFU_DIGEST: ${{ vars.OPENTOFU_IMAGE_DIGEST }}
      TF_VAR_environment: staging
      TF_VAR_domain_name: ${{ vars.STAGING_DOMAIN_NAME }}
      TF_VAR_certificate_arn: ${{ vars.STAGING_CERTIFICATE_ARN }}
      TF_VAR_image_digest: ${{ vars.CANDIDATE_IMAGE_DIGEST }}
      TF_VAR_notification_email: ${{ vars.NOTIFICATION_EMAIL }}
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_github_oidc_provider_arn: ${{ vars.GITHUB_OIDC_PROVIDER_ARN }}
      TF_VAR_gateway_role_bindings_secret_arn: ${{ vars.GATEWAY_ROLE_BINDINGS_SECRET_ARN }}
      TF_VAR_app_secret_arns: ${{ vars.APP_SECRET_ARNS_JSON }}
      TF_VAR_cognito_domain_prefix: ${{ vars.COGNITO_DOMAIN_PREFIX }}
      TF_VAR_callback_urls: ${{ vars.CALLBACK_URLS_JSON }}
      TF_VAR_logout_urls: ${{ vars.LOGOUT_URLS_JSON }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check AWS bootstrap gate
        run: |
          set -euo pipefail
          if [[ "$AWS_BOOTSTRAPPED" != "true" ]]; then
            echo 'AWS speculative plan not run — target not bootstrapped.' >> "$GITHUB_STEP_SUMMARY"
            echo 'This is not production evidence. Set AWS_BOOTSTRAPPED=true after AWS bootstrap to enable.' >> "$GITHUB_STEP_SUMMARY"
            echo '::notice::AWS speculative plan skipped — target not bootstrapped.'
            exit 0
          fi
          echo 'AWS_BOOTSTRAPPED is true — proceeding with fail-closed validation.' >> "$GITHUB_STEP_SUMMARY"
      - name: Fail-closed validation of all required inputs
        if: env.AWS_BOOTSTRAPPED == 'true'
        run: |
          set -euo pipefail
          # All required variables when AWS_BOOTSTRAPPED=true
          declare -A REQUIRED_VARS=(
            [AWS_PLAN_ROLE_ARN]="^arn:aws:iam::[0-9]{12}:role/"
            [OPENTOFU_IMAGE_DIGEST]="^sha256:[0-9a-f]{64}$"
            [STAGING_DOMAIN_NAME]="^[a-z0-9]([a-z0-9-]*[a-z0-9])?(\\.[a-z0-9]([a-z0-9-]*[a-z0-9])?)+$"
            [STAGING_CERTIFICATE_ARN]="^arn:aws:acm:[a-z]+-[a-z]+-[0-9]+:[0-9]{12}:certificate/"
            [CANDIDATE_IMAGE_DIGEST]="^sha256:[0-9a-f]{64}$"
            [NOTIFICATION_EMAIL]="^[^@ \\t]+@[^@ \\t]+\\.[^@ \\t]+$"
            [GITHUB_OIDC_PROVIDER_ARN]="^arn:aws:iam::[0-9]{12}:oidc-provider/"
            [GATEWAY_ROLE_BINDINGS_SECRET_ARN]="^arn:aws:secretsmanager:[a-z]+-[a-z]+-[0-9]+:[0-9]{12}:secret:"
            [APP_SECRET_ARNS_JSON]="^\\[.+\\]$"
            [COGNITO_DOMAIN_PREFIX]="^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
            [CALLBACK_URLS_JSON]="^\\[.+\\]$"
            [LOGOUT_URLS_JSON]="^\\[.+\\]$"
          )
          # Map env var names to their values (some are set via TF_VAR_ or direct env)
          declare -A VAR_VALUES=(
            [AWS_PLAN_ROLE_ARN]="$PLAN_ROLE_ARN"
            [OPENTOFU_IMAGE_DIGEST]="$TOFU_DIGEST"
            [STAGING_DOMAIN_NAME]="$TF_VAR_domain_name"
            [STAGING_CERTIFICATE_ARN]="$TF_VAR_certificate_arn"
            [CANDIDATE_IMAGE_DIGEST]="$TF_VAR_image_digest"
            [NOTIFICATION_EMAIL]="$TF_VAR_notification_email"
            [GITHUB_OIDC_PROVIDER_ARN]="$TF_VAR_github_oidc_provider_arn"
            [GATEWAY_ROLE_BINDINGS_SECRET_ARN]="$TF_VAR_gateway_role_bindings_secret_arn"
            [APP_SECRET_ARNS_JSON]="$TF_VAR_app_secret_arns"
            [COGNITO_DOMAIN_PREFIX]="$TF_VAR_cognito_domain_prefix"
            [CALLBACK_URLS_JSON]="$TF_VAR_callback_urls"
            [LOGOUT_URLS_JSON]="$TF_VAR_logout_urls"
          )
          missing=0
          for var_name in "${!REQUIRED_VARS[@]}"; do
            value="${VAR_VALUES[$var_name]}"
            pattern="${REQUIRED_VARS[$var_name]}"
            if [[ -z "$value" ]]; then
              echo "::error::Required variable $var_name is missing or empty."
              missing=1
            elif ! [[ "$value" =~ $pattern ]]; then
              echo "::error::Required variable $var_name has invalid format: does not match expected pattern."
              missing=1
            else
              echo "::debug::$var_name format validated."
            fi
          done
          if [[ $missing -ne 0 ]]; then
            echo 'AWS speculative plan failed — one or more required inputs are missing or invalid.' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo 'All required inputs validated.' >> "$GITHUB_STEP_SUMMARY"
      - name: Obtain short-lived plan credentials
        if: env.AWS_BOOTSTRAPPED == 'true'
        run: |
          set -euo pipefail
          TOKEN_JSON=$(curl --fail --silent --show-error -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")
          TOKEN=$(jq -r .value <<<"$TOKEN_JSON")
          CREDS=$(aws sts assume-role-with-web-identity --role-arn "$PLAN_ROLE_ARN" --role-session-name "xray-plan-${GITHUB_RUN_ID}" --web-identity-token "$TOKEN" --duration-seconds 1800)
          echo "::add-mask::$(jq -r .Credentials.AccessKeyId <<<"$CREDS")"
          echo "::add-mask::$(jq -r .Credentials.SecretAccessKey <<<"$CREDS")"
          echo "::add-mask::$(jq -r .Credentials.SessionToken <<<"$CREDS")"
          echo "AWS_ACCESS_KEY_ID=$(jq -r .Credentials.AccessKeyId <<<"$CREDS")" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$(jq -r .Credentials.SecretAccessKey <<<"$CREDS")" >> "$GITHUB_ENV"
          echo "AWS_SESSION_TOKEN=$(jq -r .Credentials.SessionToken <<<"$CREDS")" >> "$GITHUB_ENV"
      - name: Validate and create speculative plan
        if: env.AWS_BOOTSTRAPPED == 'true'
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/opentofu/opentofu@$TOFU_DIGEST"
          docker run --rm -v "$PWD/$IAC_DIR:/workspace" -w /workspace "$IMAGE" fmt -check -recursive
          docker run --rm -v "$PWD/$IAC_DIR:/workspace" -w /workspace "$IMAGE" init -backend=false
          docker run --rm -v "$PWD/$IAC_DIR:/workspace" -w /workspace "$IMAGE" validate
          docker run --rm --env-file <(env | awk '/^(AWS_|TF_VAR_)/ {print}') -v "$PWD/$IAC_DIR:/workspace" -w /workspace "$IMAGE" plan -refresh=false -lock=false -out=/tmp/xray.tfplan >/tmp/xray-plan.log
          rm -f /tmp/xray.tfplan /tmp/xray-plan.log
          echo 'Plan completed without retaining a sensitive binary plan.' >> "$GITHUB_STEP_SUMMARY"
