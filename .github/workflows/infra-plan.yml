name: Infrastructure plan
on:
  pull_request:
    paths:
      - 'infra/aws-controlled-beta/**'
      - '.github/workflows/infra-plan.yml'
permissions:
  contents: read
jobs:
  static:
    name: static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.13'
      - run: python3 scripts/check_iac_contract.py

  speculative-plan:
    name: speculative-plan
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      IAC_DIR: infra/aws-controlled-beta
      PLAN_ROLE_ARN: ${{ vars.AWS_PLAN_ROLE_ARN }}
      TOFU_DIGEST: ${{ vars.OPENTOFU_IMAGE_DIGEST }}
      TF_VAR_environment: staging
      TF_VAR_domain_name: ${{ vars.STAGING_DOMAIN_NAME }}
      TF_VAR_certificate_arn: ${{ vars.STAGING_CERTIFICATE_ARN }}
      TF_VAR_image_digest: ${{ vars.CANDIDATE_IMAGE_DIGEST }}
      TF_VAR_notification_email: ${{ vars.NOTIFICATION_EMAIL }}
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_github_oidc_provider_arn: ${{ vars.GITHUB_OIDC_PROVIDER_ARN }}
      TF_VAR_gateway_role_bindings_secret_arn: ${{ vars.GATEWAY_ROLE_BINDINGS_SECRET_ARN }}
      TF_VAR_app_secret_arns: ${{ vars.APP_SECRET_ARNS_JSON }}
      TF_VAR_cognito_domain_prefix: ${{ vars.COGNITO_DOMAIN_PREFIX }}
      TF_VAR_callback_urls: ${{ vars.CALLBACK_URLS_JSON }}
      TF_VAR_logout_urls: ${{ vars.LOGOUT_URLS_JSON }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Require pinned OpenTofu image and role
        run: |
          set -euo pipefail
          [[ "$TOFU_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$PLAN_ROLE_ARN" =~ ^arn:aws:iam::[0-9]{12}:role/ ]]
      - name: Obtain short-lived plan credentials
        run: |
          set -euo pipefail
          TOKEN_JSON=$(curl --fail --silent --show-error -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")
          TOKEN=$(jq -r .value <<<"$TOKEN_JSON")
          CREDS=$(aws sts assume-role-with-web-identity --role-arn "$PLAN_ROLE_ARN" --role-session-name "xray-plan-${GITHUB_RUN_ID}" --web-identity-token "$TOKEN" --duration-seconds 1800)
          echo "::add-mask::$(jq -r .Credentials.AccessKeyId <<<"$CREDS")"
          echo "::add-mask::$(jq -r .Credentials.SecretAccessKey <<<"$CREDS")"
          echo "::add-mask::$(jq -r .Credentials.SessionToken <<<"$CREDS")"
          echo "AWS_ACCESS_KEY_ID=$(jq -r .Credentials.AccessKeyId <<<"$CREDS")" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$(jq -r .Credentials.SecretAccessKey <<<"$CREDS")" >> "$GITHUB_ENV"
          echo "AWS_SESSION_TOKEN=$(jq -r .Credentials.SessionToken <<<"$CREDS")" >> "$GITHUB_ENV"
      - name: Validate and create speculative plan
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/opentofu/opentofu@$TOFU_DIGEST"
          docker run --rm -v "$PWD/$IAC_DIR:/workspace" -w /workspace "$IMAGE" fmt -check -recursive
          docker run --rm -v "$PWD/$IAC_DIR:/workspace" -w /workspace "$IMAGE" init -backend=false
          docker run --rm -v "$PWD/$IAC_DIR:/workspace" -w /workspace "$IMAGE" validate
          docker run --rm --env-file <(env | awk '/^(AWS_|TF_VAR_)/ {print}') -v "$PWD/$IAC_DIR:/workspace" -w /workspace "$IMAGE" plan -refresh=false -lock=false -out=/tmp/xray.tfplan >/tmp/xray-plan.log
          rm -f /tmp/xray.tfplan /tmp/xray-plan.log
          echo 'Plan completed without retaining a sensitive binary plan.' >> "$GITHUB_STEP_SUMMARY"
