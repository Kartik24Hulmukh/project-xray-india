name: Deploy immutable AWS image
on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        required: true
        options: [staging, production]
      git_sha:
        description: Exact reviewed 40-character commit SHA
        required: true
        type: string
      image_digest:
        description: Exact ECR sha256 image digest
        required: true
        type: string
permissions:
  contents: read
  checks: read
  id-token: write
concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      DEPLOY_ROLE_ARN: ${{ inputs.environment == 'production' && vars.PRODUCTION_DEPLOY_ROLE_ARN || vars.STAGING_DEPLOY_ROLE_ARN }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_APP_SERVICE: ${{ vars.ECS_APP_SERVICE }}
      ECS_GATEWAY_SERVICE: ${{ vars.ECS_GATEWAY_SERVICE }}
      APP_TASK_FAMILY: ${{ vars.ECS_APP_TASK_FAMILY }}
      GATEWAY_TASK_FAMILY: ${{ vars.ECS_GATEWAY_TASK_FAMILY }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
      EXPECTED_SHA: ${{ inputs.git_sha }}
      IMAGE_DIGEST: ${{ inputs.image_digest }}
    steps:
      - name: Validate immutable inputs
        run: |
          set -euo pipefail
          [[ "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$DEPLOY_ROLE_ARN" =~ ^arn:aws:iam::[0-9]{12}:role/ ]]
          [[ "$PUBLIC_BASE_URL" =~ ^https:// ]]
          test -n "$ECS_APP_SERVICE"
          test -n "$ECS_GATEWAY_SERVICE"
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ inputs.git_sha }}
          fetch-depth: 1
      - name: Verify exact checkout and required checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          CHECKS=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${EXPECTED_SHA}/check-runs" --paginate)
          for required in unit-and-rehearsal postgres blocking-security; do
            jq -e --arg name "$required" '[.check_runs[] | select(.name==$name and .conclusion=="success")] | length > 0' <<<"$CHECKS"
          done
      - name: Obtain short-lived deployment credentials
        run: |
          set -euo pipefail
          TOKEN_JSON=$(curl --fail --silent --show-error -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")
          TOKEN=$(jq -r .value <<<"$TOKEN_JSON")
          CREDS=$(aws sts assume-role-with-web-identity --role-arn "$DEPLOY_ROLE_ARN" --role-session-name "xray-deploy-${GITHUB_RUN_ID}" --web-identity-token "$TOKEN" --duration-seconds 1800)
          echo "::add-mask::$(jq -r .Credentials.AccessKeyId <<<"$CREDS")"
          echo "::add-mask::$(jq -r .Credentials.SecretAccessKey <<<"$CREDS")"
          echo "::add-mask::$(jq -r .Credentials.SessionToken <<<"$CREDS")"
          echo "AWS_ACCESS_KEY_ID=$(jq -r .Credentials.AccessKeyId <<<"$CREDS")" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$(jq -r .Credentials.SecretAccessKey <<<"$CREDS")" >> "$GITHUB_ENV"
          echo "AWS_SESSION_TOKEN=$(jq -r .Credentials.SessionToken <<<"$CREDS")" >> "$GITHUB_ENV"
      - name: Register digest-bound task definitions
        id: deploy
        run: |
          set -euo pipefail
          PREVIOUS_APP=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_APP_SERVICE" | jq -r '.services[0].taskDefinition')
          PREVIOUS_GATEWAY=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_GATEWAY_SERVICE" | jq -r '.services[0].taskDefinition')
          echo "previous_app=$PREVIOUS_APP" >> "$GITHUB_OUTPUT"
          echo "previous_gateway=$PREVIOUS_GATEWAY" >> "$GITHUB_OUTPUT"
          IMAGE="$ECR_REPOSITORY_URL@$IMAGE_DIGEST"
          register_family() {
            family="$1"
            container="$2"
            output="$3"
            aws ecs describe-task-definition --task-definition "$family" --query taskDefinition > "/tmp/${container}.json"
            jq --arg image "$IMAGE" --arg container "$container" 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy) | .containerDefinitions |= map(if .name==$container then .image=$image else . end)' "/tmp/${container}.json" > "/tmp/${container}-next.json"
            aws ecs register-task-definition --cli-input-json "file:///tmp/${container}-next.json" | jq -r '.taskDefinition.taskDefinitionArn' > "$output"
          }
          register_family "$APP_TASK_FAMILY" app /tmp/app-arn
          register_family "$GATEWAY_TASK_FAMILY" gateway /tmp/gateway-arn
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_APP_SERVICE" --task-definition "$(cat /tmp/app-arn)" --force-new-deployment >/tmp/app-deploy.json
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_APP_SERVICE"
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_GATEWAY_SERVICE" --task-definition "$(cat /tmp/gateway-arn)" --force-new-deployment >/tmp/gateway-deploy.json
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_GATEWAY_SERVICE"
      - name: Verify running digest and endpoint
        run: |
          set -euo pipefail
          verify_service() {
            service="$1"
            container="$2"
            tasks=$(aws ecs list-tasks --cluster "$ECS_CLUSTER" --service-name "$service" --desired-status RUNNING | jq -r '.taskArns[]')
            test -n "$tasks"
            described=$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks $tasks)
            jq -e --arg digest "$IMAGE_DIGEST" --arg container "$container" '[.tasks[].containers[] | select(.name==$container) | .imageDigest==$digest] | length > 0 and all' <<<"$described"
          }
          verify_service "$ECS_APP_SERVICE" app
          verify_service "$ECS_GATEWAY_SERVICE" gateway
          curl --fail --silent --show-error "$PUBLIC_BASE_URL/health" >/tmp/health.json
          python3 scripts/smoke_e2e.py
      - name: Roll back failed deployment
        if: failure() && steps.deploy.outputs.previous_app != '' && steps.deploy.outputs.previous_gateway != ''
        run: |
          set -euo pipefail
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_APP_SERVICE" --task-definition "${{ steps.deploy.outputs.previous_app }}" --force-new-deployment
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_GATEWAY_SERVICE" --task-definition "${{ steps.deploy.outputs.previous_gateway }}" --force-new-deployment
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_APP_SERVICE" "$ECS_GATEWAY_SERVICE"
      - name: Deployment receipt
        if: always()
        run: |
          jq -n --arg sha "$EXPECTED_SHA" --arg digest "$IMAGE_DIGEST" --arg environment "${{ inputs.environment }}" --arg run "$GITHUB_RUN_ID" '{git_sha:$sha,image_digest:$digest,environment:$environment,workflow_run:$run}' | tee deployment-receipt.json
          sha256sum deployment-receipt.json | tee -a "$GITHUB_STEP_SUMMARY"
