name: Security
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  blocking-security:
    name: blocking-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.13'
          cache: pip
      - name: Require immutable scanner images
        env:
          GITLEAKS_DIGEST: ${{ vars.GITLEAKS_IMAGE_DIGEST }}
          TRIVY_DIGEST: ${{ vars.TRIVY_IMAGE_DIGEST }}
          SYFT_DIGEST: ${{ vars.SYFT_IMAGE_DIGEST }}
          GRYPE_DIGEST: ${{ vars.GRYPE_IMAGE_DIGEST }}
        run: |
          set -euo pipefail
          for value in "$GITLEAKS_DIGEST" "$TRIVY_DIGEST" "$SYFT_DIGEST" "$GRYPE_DIGEST"; do
            [[ "$value" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo 'scanner image digest is missing or invalid'; exit 1; }
          done
      - name: Validate Grype exception file
        run: python3 scripts/check_grype_exceptions.py
      - name: Secret scan
        env:
          DIGEST: ${{ vars.GITLEAKS_IMAGE_DIGEST }}
        run: docker run --rm -v "$PWD:/repo" "ghcr.io/gitleaks/gitleaks@$DIGEST" detect --source /repo --config /repo/.gitleaks.toml --redact --no-banner
      - name: Dependency and IaC scan
        env:
          DIGEST: ${{ vars.TRIVY_IMAGE_DIGEST }}
        run: docker run --rm -v "$PWD:/repo" "aquasec/trivy@$DIGEST" fs --exit-code 1 --severity HIGH,CRITICAL --scanners vuln,misconfig,secret --ignorefile /repo/.trivyignore.yaml /repo
      - name: Licence policy scan
        env:
          DIGEST: ${{ vars.TRIVY_IMAGE_DIGEST }}
        run: docker run --rm -v "$PWD:/repo" "aquasec/trivy@$DIGEST" fs --exit-code 1 --severity HIGH,CRITICAL --scanners license --license-full /repo
      - name: Build candidate image
        run: docker build --pull --tag project-xray:security-${GITHUB_SHA} .
      - name: Generate SBOM
        env:
          DIGEST: ${{ vars.SYFT_IMAGE_DIGEST }}
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/out" "anchore/syft@$DIGEST" project-xray:security-${GITHUB_SHA} -o cyclonedx-json=/out/sbom.cdx.json
      - name: Scan candidate image
        env:
          DIGEST: ${{ vars.GRYPE_IMAGE_DIGEST }}
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/repo" "anchore/grype@$DIGEST" project-xray:security-${GITHUB_SHA} --fail-on high --config /repo/.grype.yaml
      - name: Record SBOM digest
        if: always()
        run: sha256sum sbom.cdx.json | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-cyclonedx-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 30
          if-no-files-found: error
