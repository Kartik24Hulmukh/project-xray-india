name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  unit-and-rehearsal:
    name: unit-and-rehearsal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.13'
          cache: pip
      - name: Install Python dependencies
        run: python3 -m pip install --requirement requirements.txt
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
      - name: Install Node dependencies
        run: npm install
      - name: Unit and integration tests
        run: python3 -m unittest discover -s tests -v
      - name: Repository security contracts
        run: |
          python3 scripts/check_iac_contract.py
          python3 scripts/check_workflow_security.py
          python3 scripts/check_grype_exceptions.py
      - name: Synthetic production rehearsal
        run: python3 scripts/rehearse_production.py
      - name: Synthetic smoke
        run: python3 scripts/smoke_e2e.py
      - name: Release checks
        env:
          CHROMIUM_PATH: /usr/bin/chromium
        run: python3 scripts/check_release.py

  postgres:
    name: postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_USER: xray
          POSTGRES_PASSWORD: xray_ci_password
          POSTGRES_DB: xray_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xray -d xray_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://xray:xray_ci_password@localhost:5432/xray_ci?sslmode=disable
      DB_POOL_MAX: '5'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: '3.13'
          cache: pip
      - run: python3 -m pip install --requirement requirements.txt
      - name: Apply PostgreSQL schema
        run: |
          python3 - <<'PY'
          import os, psycopg2
          from pathlib import Path
          url = os.environ['DATABASE_URL']
          schema = Path('db/schema_postgres.sql').read_text()
          conn = psycopg2.connect(url)
          conn.autocommit = True
          cur = conn.cursor()
          cur.execute(schema)
          cur.close(); conn.close()
          print('schema applied')
          PY
      - name: Live PostgreSQL tests
        run: python3 -m unittest tests.test_postgres_live -v
